name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build application
        run: npm run build:electron && npm run verify:bundle && npx vite build

      - name: Verify packaged resources
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/assets/monkey/idle.svg")) {
            throw "Missing monkey SVG resource"
          }

      - name: Build Electron (Windows)
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: monkeycode-desktop-pet-win-x64
          path: |
            release/*.exe
            release/*.yml
          retention-days: 30
          if-no-files-found: error
